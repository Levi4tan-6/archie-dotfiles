# ######## Window rules (Corregido según Wiki) ########

# Regla para centrar ventanas que ya están flotando
# windowrule = center on, on:floating
# En la nueva sintaxis, los booleanos de estado se ponen directamente


# Reglas de flotación para títulos específicos
windowrule = float on, match:title ^(Volume Control)(.*)$

# Opacidad y Bordes
windowrule = opacity 0.8 0.8, match:class ^(alacritty)$
# windowrule = border_color rgba(a6e3a1ff) rgba(a6e3a180), on:floating

# Xwaylandvideobridge
windowrule = opacity 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on, match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur on, match:class ^(xwaylandvideobridge)$

# Dialogs
windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Select a File)(.*)$
windowrule = float on, match:title ^(Choose wallpaper)(.*)$
windowrule = float on, match:title ^(Open Folder)(.*)$
windowrule = float on, match:title ^(Save As)(.*)$
windowrule = float on, match:title ^(Library)(.*)$
windowrule = float on, match:title ^(File Upload)(.*)$
