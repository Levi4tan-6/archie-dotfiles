decoration {
    rounding = 20
    rounding_power = 2     # Suavidad del rounding
    blur {
        enabled = false    # Desactivado: impacto en rendimiento con GPU híbrida Intel+NVIDIA
    }
    active_opacity = 1.0
    inactive_opacity = 0.95
    dim_inactive = true
    dim_strength = 0.2     # Foco dinámico sutil
    fullscreen_opacity = 1.0
    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(00000066)
        offset = 0 2       # Offset (x y) para sombra direccional
    }
}
