animations {
    enabled = true

    # ── Bezier curves (solo las activas) ──
    bezier = md3_decel,      0.05, 0.7,  0.1,  1
    bezier = md3_accel,      0.3,  0,    0.8,  0.15
    bezier = overshot,       0.05, 0.9,  0.1,  1.1
    bezier = crazyshot,      0.1,  1.5,  0.76, 0.92
    bezier = menu_decel,     0.1,  1,    0,    1
    bezier = menu_accel,     0.38, 0.04, 1,    0.07
    bezier = AdorableBounce, 0.3,  0.7,  0.5,  1.15
    bezier = linear,         0.0,  0.0,  1.0,  1.0

    # ── Animaciones ──
    animation = windows,          1, 3,   crazyshot,      popin 20%
    animation = windowsIn,        1, 3,   AdorableBounce, popin 10%
    animation = windowsOut,       1, 3,   md3_accel,      popin 10%
    animation = border,           1, 10,  default
    animation = borderangle,      1, 30,  linear,         loop   # Gradiente giratorio continuo
    animation = fade,             1, 3,   md3_decel
    animation = layers,           1, 2,   md3_decel,      popin
    animation = layersIn,         1, 3,   menu_decel,     popin
    animation = layersOut,        1, 1.6, menu_accel
    animation = fadeLayersIn,     1, 2,   menu_decel
    animation = fadeLayersOut,    1, 4.5, menu_accel
    animation = workspaces,       1, 7,   menu_decel,     slidefadevert 90%
    animation = specialWorkspace, 1, 3,   md3_decel,      slidevert
}
