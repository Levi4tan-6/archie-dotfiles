# SUPER KEY
$mainMod = SUPER

# Categories (for script)
#! @actions: Actions
#! @tools: Tools
#! @apps: Applications
#! @windows: Windows
#! @workspaces: Workspaces
#! @misc: Misc

# Applications
bind = $mainMod, T, exec, alacritty
bind = $mainMod, B, exec, firefox   
bind = $mainMod, E, exec, nautilus
bind = $mainMod, R, exec, rofi -show

# Windows
bind = $mainMod, Q, killactive #! @description: "Close window"; @windows;
bind = $mainMod, F, fullscreen #! @description: "Open window in full screen mode"; @windows;
bind = $mainMod SHIFT, F, fullscreen, 1 # Fake fullscreen
bind = $mainMod, G, togglegroup #! @description: "Toggle group/tab"; @windows;
bind = $mainMod SHIFT, G, togglefloating #! @description: "Toggle floating"; @windows;
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100

# Actions
bind = $mainMod, L, exec, hyprlock --immediate #! @description: "Lock screen"; @actions;


# Workspaces
bind = $mainMod, 1, workspace, 1 #! @description: "Switch workspace"; @workspaces; @replace "1" > "0-9";
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1 #! @description: "Move window to workspace"; @workspaces; @replace "1" > "0-9";
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod CTRL, space, workspace, empty #! @description: "Switch to empty workspace"; @workspaces;

# Scratchpad (special workspace)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Fn keys (bindel: auto-repeat y funciona bloqueado; bindl: funciona bloqueado)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindl  = , XF86Lock,              exec, hyprlock

# Screenshots (Feature 1)
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy #! @description: "Screenshot region to clipboard"; @actions;
bind = SHIFT, Print, exec, grim -g "$(slurp -d)" ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png #! @description: "Screenshot region to file"; @actions;

# Night Light (Feature 3)
bind = $mainMod, N, exec, pkill hyprsunset || hyprsunset -t 4500 #! @description: "Toggle Night Light (Hyprsunset)"; @actions;

# HyprPanel Toggles
bindr = $mainMod, Super_L, exec, hyprpanel t dashboardmenu # Tap Super para Dashboard
bind = $mainMod, A, exec, hyprpanel t audiomenu
bind = $mainMod, M, exec, hyprpanel t networkmenu
bind = $mainMod, P, exec, hyprpanel t powermenu
bind = $mainMod, C, exec, hyprpanel t calendarmenu
bind = $mainMod, space, exec, hyprpanel t energymenu