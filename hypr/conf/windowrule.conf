# ══════════════════════════════════════════════
#  WINDOW RULES — Sintaxis de bloques (moderna)
# ══════════════════════════════════════════════

# Opacidad: terminales
windowrule {
    name = opacity-alacritty
    match:class = ^alacritty$
    opacity = 0.85 0.80
}

# Flotante: controles de audio
windowrule {
    name = float-volume
    match:title = ^Volume Control(.*)$
    float = true
    center = true
    size = 800 600
}

# Flotante: diálogos de archivo e imágenes
windowrule {
    name = float-file-dialogs
    match:title = ^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$
    float = true
    center = true
}

# XWaylandVideoBridge (para captura de pantalla)
windowrule {
    name = xwaylandvideobridge
    match:class = ^xwaylandvideobridge$
    opacity = 0.0 0.0
    no_anim = true
    no_initial_focus = true
    max_size = 1 1
    no_blur = true
}
