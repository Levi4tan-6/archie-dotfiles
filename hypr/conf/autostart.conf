# ── Systemd & D-Bus (CRÍTICO: Primero para que las env vars fluyan a los servicios) ──
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Wallpaper Backend ──
exec-once = awww-daemon &

# ── Background Services ──
exec-once = hyprpanel
exec-once = hypridle
# exec-once = hyprsunset -t 5000 # Estático (desactivado por script)
exec-once = ~/.config/hypr/scripts/night_light.sh

# ── Appearance ──
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
